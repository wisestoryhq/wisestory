services:
  db:
    image: pgvector/pgvector:pg16
    container_name: wisestory-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: wisestory
      POSTGRES_PASSWORD: wisestory
      POSTGRES_DB: wisestory
    ports:
      - "5434:5432"
    volumes:
      - wisestory-pgdata:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d

volumes:
  wisestory-pgdata:
